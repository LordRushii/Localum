<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline AI Image Generator - Phase 2</title>
  <link rel="stylesheet" href="/styles.css">
</head>

<body>
  <div class="container">
    <h1>Offline AI Image Generator</h1>
    <p>Phase 3 Checkpoint: Model Lifecycle &amp; Singleton Pattern</p>
    
    <div class="card">
      <button id="downloadBtn">Trigger Model Download</button>
      <div id="statusContainer" style="margin-top: 1.5rem;">
        <div class="progress-info">
          <span id="statusText">Awaiting trigger...</span>
          <span id="percentText">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="progressBar" class="progress-bar" style="width: 0%;"></div>
        </div>
      </div>
    <div class="card" style="margin-top: 1.5rem;">
      <h3>Generate Image</h3>
      <textarea id="promptInput" placeholder="Enter prompt here..." rows="3" style="width: 100%; box-sizing: border-box; margin-bottom: 1rem; padding: 0.5rem;"></textarea>
      <button id="generateBtn" disabled>Generate Image</button>
      
      <div id="genStatusContainer" style="margin-top: 1.5rem; display: none;">
        <div class="progress-info">
          <span id="genStatusText">Starting diffusion...</span>
          <span id="genPercentText">0%</span>
        </div>
        <div class="progress-bar-bg">
          <div id="genProgressBar" class="progress-bar" style="width: 0%;"></div>
        </div>
      </div>

      <div id="imageResultContainer" style="margin-top: 1.5rem; text-align: center;">
        <img id="resultImage" style="max-width: 100%; display: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" />
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>

</html>
